<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente IA de Inducción</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-content p {
            margin: 0 0 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ol {
            margin: 0;
            padding-left: 20px;
        }

        .message-content ul {
            margin: 0;
            padding-left: 20px;
        }

        .message-content li {
            margin: 0 0 6px;
        }

        .message-content li:last-child {
            margin-bottom: 0;
        }

        .message-content h1,
        .message-content h2,
        .message-content h3 {
            margin: 0 0 8px;
            line-height: 1.25;
            font-weight: 700;
        }

        .message-content h1 {
            font-size: 20px;
        }

        .message-content h2 {
            font-size: 18px;
        }

        .message-content h3 {
            font-size: 16px;
        }

        .message-content a {
            color: #4c63d9;
            text-decoration: underline;
            word-break: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.bot .message-content a:hover {
            color: #3348b8;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agente de Inducción EIA</h1>
            <p>Asistente de IA</p>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Escribe tu mensaje aquí..."
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Permitir enviar con Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;

            // Mostrar mensaje del usuario
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.focus();
            sendBtn.disabled = true;

            // Mostrar indicador de escritura
            const typingId = addTypingIndicator();

            try {
                // Enviar mensaje al servidor
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                // Remover indicador de escritura
                document.getElementById(typingId).remove();

                if (!response.ok) {
                    throw new Error('Error en la respuesta del servidor');
                }

                const data = await response.json();
                
                // Mostrar respuesta del agente
                addMessage(data.reply, 'bot');
            } catch (error) {
                // Remover indicador de escritura si aún existe
                const typingElement = document.getElementById(typingId);
                if (typingElement) {
                    typingElement.remove();
                }
                
                console.error('Error:', error);
                addMessage('Disculpa, ocurrió un error al procesar tu mensaje.', 'bot');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (sender === 'bot') {
                contentDiv.innerHTML = formatStructuredMessage(text);
            } else {
                contentDiv.textContent = text;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // Scroll hacia abajo
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            const id = 'typing-' + Date.now();
            messageDiv.id = id;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'typing-indicator';
            contentDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // Scroll hacia abajo
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return id;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatInline(text) {
            const withBold = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            const withMarkdownLinks = withBold.replace(/\[([^\]]+)]\(([^)\s]+)\)/g, (match, linkText, rawUrl) => {
                const allowedProtocol = /^(https?:\/\/|mailto:)/i;
                if (!allowedProtocol.test(rawUrl)) {
                    return `${linkText} (${rawUrl})`;
                }
                return `<a href="${rawUrl}" target="_blank" rel="noopener noreferrer">${linkText}</a>`;
            });

            return withMarkdownLinks.replace(/(^|\s)(https?:\/\/[^\s<]+)/g, (match, prefix, url) => {
                return `${prefix}<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }

        function formatStructuredMessage(rawText) {
            if (!rawText) {
                return '';
            }

            let normalized = rawText.replace(/\r\n/g, '\n').trim();

            // Cuando el modelo responde una lista en la misma linea, forzamos salto antes de cada item.
            normalized = normalized.replace(/([.:;!?])\s+(\d+\.\s)/g, '$1\n$2');
            normalized = normalized.replace(/([.:;!?])\s+([-*]\s)/g, '$1\n$2');

            const escaped = escapeHtml(normalized);
            const lines = escaped.split('\n');
            const htmlParts = [];
            let listType = null;

            function closeListIfOpen() {
                if (listType === 'ol') {
                    htmlParts.push('</ol>');
                } else if (listType === 'ul') {
                    htmlParts.push('</ul>');
                }
                listType = null;
            }

            for (const line of lines) {
                const trimmed = line.trim();
                const headingMatch = trimmed.match(/^(#{1,3})\s+(.*)$/);
                const orderedMatch = trimmed.match(/^\d+\.\s+(.*)$/);
                const unorderedMatch = trimmed.match(/^[-*]\s+(.*)$/);

                if (headingMatch) {
                    closeListIfOpen();
                    const headingLevel = Math.min(headingMatch[1].length, 3);
                    const headingText = formatInline(headingMatch[2]);
                    htmlParts.push(`<h${headingLevel}>${headingText}</h${headingLevel}>`);
                    continue;
                }

                if (orderedMatch) {
                    if (listType !== 'ol') {
                        closeListIfOpen();
                        htmlParts.push('<ol>');
                        listType = 'ol';
                    }
                    htmlParts.push(`<li>${formatInline(orderedMatch[1])}</li>`);
                    continue;
                }

                if (unorderedMatch) {
                    if (listType !== 'ul') {
                        closeListIfOpen();
                        htmlParts.push('<ul>');
                        listType = 'ul';
                    }
                    htmlParts.push(`<li>${formatInline(unorderedMatch[1])}</li>`);
                    continue;
                }

                closeListIfOpen();

                if (!trimmed) {
                    htmlParts.push('<p><br></p>');
                    continue;
                }

                htmlParts.push(`<p>${formatInline(trimmed)}</p>`);
            }

            closeListIfOpen();

            return htmlParts.join('');
        }

        // Mensaje inicial
        window.addEventListener('load', () => {
            addMessage('¡Hola! Soy tu asistente de IA.\nPuedo ayudarte a resolver tus preguntas sobre la Universidad EIA.', 'bot');
        });
    </script>
</body>
</html>
